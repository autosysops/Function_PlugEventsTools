# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Powershell project to Azure Function App - PlugEventsExport

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' # set this to the path to your web app project, defaults to the repository root

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: 'Download PowerShell Modules'
        shell: pwsh
        run: |
          $manifest = Get-Content './modules.json' | ConvertFrom-Json
          foreach ($mod in $manifest) {
            Write-Host "Downloading $($mod.Name) v$($mod.RequiredVersion)..."
            Save-Module -Name $mod.Name -RequiredVersion $mod.RequiredVersion `
                        -Path './Modules' -Force -AcceptLicense
          }
          Write-Host "All modules downloaded."

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E01398DE7DE64B8C94D1B5D2881AEFE1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_987D1A1D02DD4FFE80BE9B55EECFBBE3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AF91C8F26766492CA706FC3E64EAF0CC }}

      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'PlugEventsExport'
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
